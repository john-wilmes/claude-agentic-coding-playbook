# Presidio PHI Sanitization Configuration
# Principle: auto-sanitize on commit, never reject.
#
# Install: pip install presidio-analyzer presidio-anonymizer pyyaml
# Usage: auto-applied by sanitize.sh and the pre-commit-sanitize hook.

analyzer:
  # Built-in Presidio recognizers to enable
  entities:
    - PERSON
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - US_SSN
    - CREDIT_CARD
    - IP_ADDRESS
    - MEDICAL_LICENSE
    - US_DRIVER_LICENSE
    - LOCATION
    - DATE_TIME
    - NRP

  # Custom recognizers — uncomment and adapt for your domain.
  # These examples detect context-aware PHI patterns (e.g., MRN, DOB).
  #
  # custom_recognizers:
  #   - name: ContextualMRN
  #     supported_entity: MRN
  #     patterns:
  #       - name: labeled_mrn
  #         regex: "(?i)\\bMRN[:\\s#]+\\d{4,10}\\b"
  #         score: 0.9
  #     context:
  #       - mrn
  #       - medical record
  #       - patient id
  #
  #   - name: ContextualDOB
  #     supported_entity: DOB
  #     patterns:
  #       - name: labeled_dob_numeric
  #         regex: "(?i)(?:DOB|date of birth|born on|birth date|birthdate)[:\\s]+\\d{1,2}[/\\-]\\d{1,2}[/\\-]\\d{2,4}"
  #         score: 0.95
  #       - name: labeled_dob_iso
  #         regex: "(?i)(?:DOB|date of birth|born on|birth date|birthdate)[:\\s]+\\d{4}[/\\-]\\d{1,2}[/\\-]\\d{1,2}"
  #         score: 0.95
  #       - name: labeled_dob_text_month
  #         regex: "(?i)(?:DOB|date of birth|born on|birth date|birthdate)[:\\s]+(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\\s+\\d{1,2},?\\s+\\d{4}"
  #         score: 0.95
  #     context:
  #       - dob
  #       - date of birth
  #       - born
  #       - birth date
  #       - birthdate

anonymizer:
  # Replacement placeholders by entity type
  operators:
    PERSON:
      type: replace
      new_value: "[PERSON]"
    EMAIL_ADDRESS:
      type: replace
      new_value: "[EMAIL]"
    PHONE_NUMBER:
      type: replace
      new_value: "[PHONE]"
    US_SSN:
      type: replace
      new_value: "[SSN]"
    CREDIT_CARD:
      type: replace
      new_value: "[CARD]"
    IP_ADDRESS:
      type: replace
      new_value: "[IP]"
    MEDICAL_LICENSE:
      type: replace
      new_value: "[MED_LICENSE]"
    US_DRIVER_LICENSE:
      type: replace
      new_value: "[DL]"
    LOCATION:
      type: replace
      new_value: "[LOCATION]"
    DATE_TIME:
      type: replace
      new_value: "[DATE]"
    NRP:
      type: replace
      new_value: "[NRP]"
    # Uncomment if using custom recognizers above:
    # MRN:
    #   type: replace
    #   new_value: "[MRN]"
    # DOB:
    #   type: replace
    #   new_value: "[DOB]"

# Organization-specific patterns — uncomment and adapt for your environment.
# Add custom recognizers here for your system's ID formats.
#
# ehr_patterns:
#   - name: epic_mrn
#     regex: "\\bE\\d{7}\\b"
#     context: ["epic", "patient"]
