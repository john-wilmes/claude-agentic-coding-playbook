# Presidio configuration for investigation PHI sanitization
# Install: pip install presidio-analyzer presidio-anonymizer
# Usage: auto-applied by /investigate close when available

analyzer:
  entities:
    - PERSON
    - EMAIL_ADDRESS
    - PHONE_NUMBER
    - US_SSN
    - CREDIT_CARD
    - IP_ADDRESS
    - MEDICAL_LICENSE
    - US_DRIVER_LICENSE
    - LOCATION
    - DATE_TIME
    - NRP

anonymizer:
  operators:
    PERSON:
      type: replace
      new_value: "[PERSON]"
    EMAIL_ADDRESS:
      type: replace
      new_value: "[EMAIL]"
    PHONE_NUMBER:
      type: replace
      new_value: "[PHONE]"
    US_SSN:
      type: replace
      new_value: "[SSN]"
    CREDIT_CARD:
      type: replace
      new_value: "[CARD]"
    IP_ADDRESS:
      type: replace
      new_value: "[IP]"
    MEDICAL_LICENSE:
      type: replace
      new_value: "[MED_LICENSE]"
    US_DRIVER_LICENSE:
      type: replace
      new_value: "[DL]"
    LOCATION:
      type: replace
      new_value: "[LOCATION]"
    DATE_TIME:
      type: replace
      new_value: "[DATE]"
    NRP:
      type: replace
      new_value: "[NRP]"
