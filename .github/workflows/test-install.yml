name: Test Install Scripts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    name: Markdown lint
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Lint markdown files
        run: markdownlint-cli2 "**/*.md"

  linkcheck:
    runs-on: ubuntu-latest
    name: Citation linkcheck
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Check citation URLs
        run: |
          set -euo pipefail

          # Allow-list: domains that reject HEAD requests or are flaky
          ALLOW_LIST="arxiv.org doi.org fortune.com"

          is_allowed() {
            local url="$1"
            for domain in $ALLOW_LIST; do
              if echo "$url" | grep -q "$domain"; then
                return 0
              fi
            done
            return 1
          }

          fail_file=$(mktemp)
          echo "0" > "$fail_file"

          # Extract URLs from citations section
          grep -oP 'https?://[^\s>)]+' docs/best-practices.md | sort -u | while read -r url; do
            if is_allowed "$url"; then
              echo "SKIP (allow-listed): $url"
              continue
            fi

            status=$(curl --head --silent --fail --max-time 10 --write-out '%{http_code}' --output /dev/null "$url" 2>/dev/null || true)
            if [ -z "$status" ] || [ "$status" -ge 400 ] 2>/dev/null; then
              # Retry with GET (some servers reject HEAD)
              status=$(curl --silent --fail --max-time 10 --write-out '%{http_code}' --output /dev/null "$url" 2>/dev/null || true)
            fi

            if [ -z "$status" ] || [ "$status" -ge 400 ] 2>/dev/null; then
              echo "FAIL ($status): $url"
              echo "1" > "$fail_file"
            else
              echo "OK ($status): $url"
            fi
          done

          if [ "$(cat "$fail_file")" = "1" ]; then
            echo "::error::One or more citation URLs are broken"
            exit 1
          fi

  test-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        profile: [dev, research]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.profile }}

    steps:
      - uses: actions/checkout@v4

      # ── Phase 1: Dry-run ──────────────────────────────────────────

      - name: "Dry-run install (bash)"
        if: runner.os == 'Linux'
        run: |
          output=$(bash install.sh --profile ${{ matrix.profile }} --dry-run 2>&1)
          echo "$output"
          echo "$output" | grep -q '\[DRY RUN\] INSTALL'

      - name: "Dry-run install (PowerShell)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = & .\install.ps1 -Profile ${{ matrix.profile }} -DryRun *>&1 | Out-String
          Write-Output $output
          if ($output -notmatch '\[DRY RUN\] INSTALL') {
            throw "Dry-run output missing expected [DRY RUN] INSTALL lines"
          }

      - name: "Verify dry-run created no files"
        shell: bash
        run: |
          if [ -f "$HOME/.claude/CLAUDE.md" ]; then
            echo "FAIL: dry-run should not create files"
            exit 1
          fi
          echo "OK: no files created during dry-run"

      # ── Phase 2: Real install ─────────────────────────────────────

      - name: "Install (bash)"
        if: runner.os == 'Linux'
        run: bash install.sh --profile ${{ matrix.profile }} --force

      - name: "Install (PowerShell)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 -Profile ${{ matrix.profile }} -Force

      # ── Phase 2b: Verify installed files ──────────────────────────

      - name: "Verify common files"
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/CLAUDE.md"
          check "$HOME/.claude/templates/project-CLAUDE.md"
          check "$HOME/.claude/templates/hooks/pre-commit"

          exit $failed

      - name: "Verify CLAUDE.md content"
        shell: bash
        run: |
          file="$HOME/.claude/CLAUDE.md"
          if [ "${{ matrix.profile }}" = "dev" ]; then
            grep -q "Explore, Plan, Code, Verify, Commit" "$file"
            echo "OK: dev workflow string found"
          else
            grep -q "Question, Collect, Synthesize, Close" "$file"
            echo "OK: research workflow string found"
          fi

      - name: "Verify pre-commit hook is executable"
        if: runner.os == 'Linux'
        run: |
          hook="$HOME/.claude/templates/hooks/pre-commit"
          if [ ! -x "$hook" ]; then
            echo "FAIL: $hook is not executable"
            ls -l "$hook"
            exit 1
          fi
          echo "OK: pre-commit hook is executable"

      - name: "Verify dev profile skills"
        if: matrix.profile == 'dev'
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/skills/checkpoint/SKILL.md"
          check "$HOME/.claude/skills/continue/SKILL.md"
          check "$HOME/.claude/skills/playbook/SKILL.md"

          exit $failed

      - name: "Verify research profile skills and extras"
        if: matrix.profile == 'research'
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/skills/investigate/SKILL.md"
          check "$HOME/.claude/skills/continue/SKILL.md"
          check "$HOME/.claude/investigations/_patterns/"
          check "$HOME/.claude/templates/investigation/brief.md"

          exit $failed

      # ── Phase 3: Idempotency ─────────────────────────────────────

      - name: "Re-install (idempotency check, bash)"
        if: runner.os == 'Linux'
        run: bash install.sh --profile ${{ matrix.profile }} --force

      - name: "Re-install (idempotency check, PowerShell)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 -Profile ${{ matrix.profile }} -Force

      - name: "Verify files still intact after re-install"
        shell: bash
        run: |
          test -f "$HOME/.claude/CLAUDE.md" && echo "OK: CLAUDE.md"
          test -f "$HOME/.claude/templates/project-CLAUDE.md" && echo "OK: project-CLAUDE.md"
          test -f "$HOME/.claude/templates/hooks/pre-commit" && echo "OK: pre-commit"

      # ── Phase 4: Pre-commit hook integration (Linux only) ────────
      # The hook uses bash process substitution and the `file` command,
      # which aren't portable to Windows Git Bash.

      - name: "Pre-commit hook: clean commit passes"
        if: runner.os == 'Linux'
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "hello world" > "$repo/clean.txt"
          git -C "$repo" add clean.txt
          git -C "$repo" commit -m "clean commit"
          echo "OK: clean commit succeeded"

      - name: "Pre-commit hook: blocks AWS keys"
        if: runner.os == 'Linux'
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "aws_key = AKIAIOSFODNN7EXAMPLE" > "$repo/creds.txt"
          git -C "$repo" add creds.txt
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked AWS key"
            exit 1
          fi
          echo "OK: AWS key blocked"

      - name: "Pre-commit hook: blocks .env files"
        if: runner.os == 'Linux'
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "SECRET=foo" > "$repo/.env"
          git -C "$repo" add .env
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked .env"
            exit 1
          fi
          echo "OK: .env file blocked"

      - name: "Pre-commit hook: blocks large files"
        if: runner.os == 'Linux'
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          dd if=/dev/zero of="$repo/big.bin" bs=1M count=6 2>/dev/null
          git -C "$repo" add big.bin
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked 6MB file"
            exit 1
          fi
          echo "OK: large file blocked"

      # ── Phase 5: Project scaffolding ─────────────────────────────

      - name: "Scaffold a new project from templates"
        shell: bash
        run: |
          proj=$(mktemp -d)
          git init "$proj"

          # Copy project CLAUDE.md (what /playbook project does)
          cp "$HOME/.claude/templates/project-CLAUDE.md" "$proj/CLAUDE.md"

          # Verify expected sections exist
          grep -q "## Quality Gates" "$proj/CLAUDE.md"
          grep -q "## Code Review" "$proj/CLAUDE.md"
          grep -q "## Testing Strategy" "$proj/CLAUDE.md"
          grep -q "## Project Conventions" "$proj/CLAUDE.md"
          echo "OK: project CLAUDE.md has all expected sections"

          # Install pre-commit hook (what /playbook project does)
          mkdir -p "$proj/.git/hooks"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$proj/.git/hooks/pre-commit"
          chmod +x "$proj/.git/hooks/pre-commit"
          test -x "$proj/.git/hooks/pre-commit"
          echo "OK: pre-commit hook installed and executable"

      # ── Phase 6: Dogfood test (Linux only) ─────────────────────

      - name: "Dogfood: full user journey"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail

          # Use isolated HOME so nothing touches the real system
          export HOME=$(mktemp -d)
          echo "Using isolated HOME=$HOME"

          # Install fresh
          bash install.sh --profile ${{ matrix.profile }} --force

          # Create a sample project
          proj=$(mktemp -d)
          git init "$proj"
          git -C "$proj" config user.email "ci@test"
          git -C "$proj" config user.name "CI"

          # Scaffold project (simulates /playbook project)
          cp "$HOME/.claude/templates/project-CLAUDE.md" "$proj/CLAUDE.md"
          mkdir -p "$proj/.git/hooks"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$proj/.git/hooks/pre-commit"
          chmod +x "$proj/.git/hooks/pre-commit"

          # Initial commit
          echo "# Test Project" > "$proj/README.md"
          git -C "$proj" add README.md CLAUDE.md
          git -C "$proj" commit -m "initial commit"
          echo "OK: initial commit succeeded"

          # Make a code change and commit (hook should pass)
          echo 'console.log("hello")' > "$proj/index.js"
          git -C "$proj" add index.js
          git -C "$proj" commit -m "add index.js"
          echo "OK: code change commit passed hook"

          # Verify no hardcoded paths in installed skills
          if grep -r 'C--Users-johnw' "$HOME/.claude/skills/" 2>/dev/null; then
            echo "FAIL: hardcoded user-specific path found in skills"
            exit 1
          fi
          echo "OK: no hardcoded paths in skills"

          # Verify YAML frontmatter of skills is parseable
          for skill in "$HOME/.claude/skills"/*/SKILL.md; do
            [ -f "$skill" ] || continue
            # Check opening ---
            head -1 "$skill" | grep -q '^---$' || {
              echo "FAIL: $skill missing opening ---"
              exit 1
            }
            # Check closing --- exists within first 10 lines
            head -10 "$skill" | tail -n +2 | grep -q '^---$' || {
              echo "FAIL: $skill missing closing ---"
              exit 1
            }
            # Check allowed-tools is present
            head -10 "$skill" | grep -q '^allowed-tools:' || {
              echo "FAIL: $skill missing allowed-tools"
              exit 1
            }
            echo "OK: $skill frontmatter valid"
          done

      - name: "Scaffold an investigation (research profile)"
        if: matrix.profile == 'research'
        shell: bash
        run: |
          inv_dir="$HOME/.claude/investigations/TEST-001"
          mkdir -p "$inv_dir/EVIDENCE"

          # Copy brief template (what /investigate new does)
          cp "$HOME/.claude/templates/investigation/brief.md" "$inv_dir/BRIEF.md"

          # Verify brief template structure
          grep -q "## Question" "$inv_dir/BRIEF.md"
          grep -q "## Scope" "$inv_dir/BRIEF.md"
          grep -q "## Context" "$inv_dir/BRIEF.md"
          echo "OK: investigation brief has expected sections"

          # Simulate collecting evidence (numbered files)
          echo "Source: test" > "$inv_dir/EVIDENCE/001-initial-finding.md"
          echo "Source: test" > "$inv_dir/EVIDENCE/002-follow-up.md"
          test -f "$inv_dir/EVIDENCE/001-initial-finding.md"
          test -f "$inv_dir/EVIDENCE/002-follow-up.md"
          echo "OK: evidence files created with sequential numbering"

          # Verify investigation lives under _patterns parent
          test -d "$HOME/.claude/investigations/_patterns"
          echo "OK: _patterns directory exists for cross-investigation patterns"
