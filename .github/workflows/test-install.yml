name: Test Install Scripts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    name: Markdown lint
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Lint markdown files
        run: markdownlint-cli2 "**/*.md"

  linkcheck:
    runs-on: ubuntu-latest
    name: Citation linkcheck
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Check citation URLs
        run: |
          set -euo pipefail

          # Allow-list: domains that reject HEAD requests or are flaky
          ALLOW_LIST="arxiv.org doi.org fortune.com"

          is_allowed() {
            local url="$1"
            for domain in $ALLOW_LIST; do
              if echo "$url" | grep -q "$domain"; then
                return 0
              fi
            done
            return 1
          }

          fail_file=$(mktemp)
          echo "0" > "$fail_file"

          # Extract URLs from citations section
          grep -oP 'https?://[^\s>)]+' docs/best-practices.md | sort -u | while read -r url; do
            if is_allowed "$url"; then
              echo "SKIP (allow-listed): $url"
              continue
            fi

            status=$(curl --head --silent --fail --max-time 10 --write-out '%{http_code}' --output /dev/null "$url" 2>/dev/null || true)
            if [ -z "$status" ] || [ "$status" = "000" ] || [ "$status" -ge 400 ] 2>/dev/null; then
              # Retry with GET (some servers reject HEAD)
              status=$(curl --silent --fail --max-time 10 --write-out '%{http_code}' --output /dev/null "$url" 2>/dev/null || true)
            fi

            if [ -z "$status" ] || [ "$status" = "000" ] || [ "$status" -ge 400 ] 2>/dev/null; then
              echo "FAIL ($status): $url"
              echo "1" > "$fail_file"
            else
              echo "OK ($status): $url"
            fi
          done

          if [ "$(cat "$fail_file")" = "1" ]; then
            echo "::error::One or more citation URLs are broken"
            exit 1
          fi

  test-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        profile: [dev, research]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.profile }}

    steps:
      - uses: actions/checkout@v4

      # ── Phase 1: Dry-run ──────────────────────────────────────────

      - name: "Dry-run install (bash)"
        if: runner.os == 'Linux'
        run: |
          output=$(bash install.sh --profile ${{ matrix.profile }} --dry-run 2>&1)
          echo "$output"
          echo "$output" | grep -q '\[DRY RUN\] INSTALL'

      - name: "Dry-run install (PowerShell)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = & .\install.ps1 -Profile ${{ matrix.profile }} -DryRun *>&1 | Out-String
          Write-Output $output
          if ($output -notmatch '\[DRY RUN\] INSTALL') {
            throw "Dry-run output missing expected [DRY RUN] INSTALL lines"
          }

      - name: "Verify dry-run created no files"
        shell: bash
        run: |
          if [ -f "$HOME/.claude/CLAUDE.md" ]; then
            echo "FAIL: dry-run should not create files"
            exit 1
          fi
          echo "OK: no files created during dry-run"

      # ── Phase 2: Real install ─────────────────────────────────────

      - name: "Install (bash)"
        if: runner.os == 'Linux'
        run: bash install.sh --profile ${{ matrix.profile }} --force

      - name: "Install (PowerShell)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 -Profile ${{ matrix.profile }} -Force

      # ── Phase 2b: Verify installed files ──────────────────────────

      - name: "Verify common files"
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/CLAUDE.md"
          check "$HOME/.claude/templates/project-CLAUDE.md"
          check "$HOME/.claude/templates/hooks/pre-commit"

          exit $failed

      - name: "Verify CLAUDE.md content"
        shell: bash
        run: |
          file="$HOME/.claude/CLAUDE.md"
          if [ "${{ matrix.profile }}" = "dev" ]; then
            grep -q "Explore, Plan, Code, Verify, Commit" "$file"
            echo "OK: dev workflow string found"
          else
            grep -q "Question, Collect, Synthesize, Close" "$file"
            echo "OK: research workflow string found"
          fi

      - name: "Verify pre-commit hook is executable"
        if: runner.os == 'Linux'
        run: |
          hook="$HOME/.claude/templates/hooks/pre-commit"
          if [ ! -x "$hook" ]; then
            echo "FAIL: $hook is not executable"
            ls -l "$hook"
            exit 1
          fi
          echo "OK: pre-commit hook is executable"

      - name: "Verify dev profile skills"
        if: matrix.profile == 'dev'
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/skills/checkpoint/SKILL.md"
          check "$HOME/.claude/skills/continue/SKILL.md"
          check "$HOME/.claude/skills/playbook/SKILL.md"
          check "$HOME/.claude/skills/create-project/SKILL.md"
          check "$HOME/.claude/skills/learn/SKILL.md"
          check "$HOME/.claude/skills/promote/SKILL.md"

          exit $failed

      - name: "Verify research profile skills and extras"
        if: matrix.profile == 'research'
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/skills/investigate/SKILL.md"
          check "$HOME/.claude/skills/continue/SKILL.md"
          check "$HOME/.claude/investigations/_patterns/"
          check "$HOME/.claude/templates/investigation/brief.md"

          exit $failed

      # ── Phase 2b2: Session hooks and knowledge templates ─────────

      - name: "Verify session hooks installed"
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/hooks/session-start.js"
          check "$HOME/.claude/hooks/session-end.js"

          exit $failed

      - name: "Verify session-start.js has knowledge injection"
        shell: bash
        run: |
          file="$HOME/.claude/hooks/session-start.js"
          grep -q 'getRelevantKnowledge' "$file"
          echo "OK: session-start.js has knowledge injection function"
          grep -q 'Lessons Learned' "$file"
          echo "OK: session-start.js extracts Lessons Learned"

      - name: "Verify knowledge templates"
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/templates/knowledge/entry-template.md"
          check "$HOME/.claude/templates/knowledge/validate-entries.yml"
          check "$HOME/.claude/templates/knowledge/pre-commit"
          check "$HOME/.claude/templates/knowledge/README.md"

          exit $failed

      # ── Phase 2c: Research profile template verification ─────────

      - name: "Verify research profile templates"
        if: matrix.profile == 'research'
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/templates/investigation/evidence.md"
          check "$HOME/.claude/templates/investigation/findings.md"
          check "$HOME/.claude/templates/investigation/status.md"
          check "$HOME/.claude/templates/investigation/presidio.yaml"
          check "$HOME/.claude/templates/investigation/hooks/pre-commit-sanitize"
          check "$HOME/.claude/scripts/sanitize.sh"

          exit $failed

      - name: "Verify sanitize.sh is executable"
        if: matrix.profile == 'research' && runner.os == 'Linux'
        run: |
          script="$HOME/.claude/scripts/sanitize.sh"
          if [ ! -x "$script" ]; then
            echo "FAIL: $script is not executable"
            ls -l "$script"
            exit 1
          fi
          echo "OK: sanitize.sh is executable"

      # ── Phase 2d: Cursor template verification ───────────────────

      - name: "Verify Cursor templates"
        shell: bash
        run: |
          failed=0
          check() {
            if [ ! -e "$1" ]; then
              echo "MISSING: $1"
              failed=1
            else
              echo "OK: $1"
            fi
          }

          check "$HOME/.claude/templates/cursor/rules/standards.mdc"
          check "$HOME/.claude/templates/cursor/rules/quality.mdc"
          check "$HOME/.claude/templates/cursor/commands/checkpoint.md"

          exit $failed

      # ── Phase 3: Idempotency ─────────────────────────────────────

      - name: "Re-install (idempotency check, bash)"
        if: runner.os == 'Linux'
        run: bash install.sh --profile ${{ matrix.profile }} --force

      - name: "Re-install (idempotency check, PowerShell)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 -Profile ${{ matrix.profile }} -Force

      - name: "Verify files still intact after re-install"
        shell: bash
        run: |
          test -f "$HOME/.claude/CLAUDE.md" && echo "OK: CLAUDE.md"
          test -f "$HOME/.claude/templates/project-CLAUDE.md" && echo "OK: project-CLAUDE.md"
          test -f "$HOME/.claude/templates/hooks/pre-commit" && echo "OK: pre-commit"

      # ── Phase 4: Pre-commit hook integration ────────────────────

      - name: "Pre-commit hook: clean commit passes"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "hello world" > "$repo/clean.txt"
          git -C "$repo" add clean.txt
          git -C "$repo" commit -m "clean commit"
          echo "OK: clean commit succeeded"

      - name: "Pre-commit hook: blocks AWS keys"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "aws_key = AKIAIOSFODNN7EXAMPLE" > "$repo/creds.txt"
          git -C "$repo" add creds.txt
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked AWS key"
            exit 1
          fi
          echo "OK: AWS key blocked"

      - name: "Pre-commit hook: blocks .env files"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "SECRET=foo" > "$repo/.env"
          git -C "$repo" add .env
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked .env"
            exit 1
          fi
          echo "OK: .env file blocked"

      - name: "Pre-commit hook: blocks large files"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          dd if=/dev/zero of="$repo/big.bin" bs=1M count=6 2>/dev/null
          git -C "$repo" add big.bin
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked 6MB file"
            exit 1
          fi
          echo "OK: large file blocked"

      # ── Phase 4b: Generic secret pattern ─────────────────────────

      - name: "Pre-commit hook: blocks generic secrets"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "password=supersecretvalue123" > "$repo/config.txt"
          git -C "$repo" add config.txt
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked generic secret"
            exit 1
          fi
          echo "OK: generic secret (password=...) blocked"

      - name: "Pre-commit hook: allows short values (no false positive)"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "token=short7" > "$repo/config.txt"
          git -C "$repo" add config.txt
          git -C "$repo" commit -m "clean commit"
          echo "OK: short value (under 8 chars) not blocked"

      # ── Phase 4c: .env variant patterns ──────────────────────────

      - name: "Pre-commit hook: blocks .env.local"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "SECRET=foo" > "$repo/.env.local"
          git -C "$repo" add .env.local
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked .env.local"
            exit 1
          fi
          echo "OK: .env.local blocked"

      - name: "Pre-commit hook: blocks secrets.env"
        shell: bash
        run: |
          repo=$(mktemp -d)
          git init "$repo"
          git -C "$repo" config user.email "ci@test"
          git -C "$repo" config user.name "CI"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$repo/.git/hooks/pre-commit"
          echo "SECRET=foo" > "$repo/secrets.env"
          git -C "$repo" add secrets.env
          if git -C "$repo" commit -m "bad commit" 2>&1; then
            echo "FAIL: hook should have blocked secrets.env"
            exit 1
          fi
          echo "OK: secrets.env blocked"

      # ── Phase 5: Project scaffolding ─────────────────────────────

      - name: "Scaffold a new project from templates"
        shell: bash
        run: |
          proj=$(mktemp -d)
          git init "$proj"

          # Copy project CLAUDE.md (what /playbook project does)
          cp "$HOME/.claude/templates/project-CLAUDE.md" "$proj/CLAUDE.md"

          # Verify expected sections exist
          grep -q "## Quality Gates" "$proj/CLAUDE.md"
          grep -q "## Code Review" "$proj/CLAUDE.md"
          grep -q "## Testing Strategy" "$proj/CLAUDE.md"
          grep -q "## Project Conventions" "$proj/CLAUDE.md"
          echo "OK: project CLAUDE.md has all expected sections"

          # Install pre-commit hook (what /playbook project does)
          mkdir -p "$proj/.git/hooks"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$proj/.git/hooks/pre-commit"
          chmod +x "$proj/.git/hooks/pre-commit"
          test -x "$proj/.git/hooks/pre-commit"
          echo "OK: pre-commit hook installed and executable"

      # ── Phase 5b: sanitize.sh smoke test ────────────────────────

      - name: "sanitize.sh: no arguments exits with error"
        if: matrix.profile == 'research' && runner.os == 'Linux'
        run: |
          script="$HOME/.claude/scripts/sanitize.sh"
          if "$script" 2>/dev/null; then
            echo "FAIL: sanitize.sh should exit non-zero with no arguments"
            exit 1
          fi
          echo "OK: sanitize.sh exits non-zero with no arguments"

      - name: "sanitize.sh: missing presidio.yaml degrades gracefully"
        if: matrix.profile == 'research' && runner.os == 'Linux'
        run: |
          # Use isolated HOME so there's no presidio.yaml
          export HOME=$(mktemp -d)
          script_src="$GITHUB_WORKSPACE/profiles/research/scripts/sanitize.sh"
          tmp_file=$(mktemp)
          echo "test content" > "$tmp_file"
          "$script_src" "$tmp_file"
          echo "OK: sanitize.sh exits 0 when presidio.yaml is missing"

      - name: "sanitize.sh: no Presidio installed degrades gracefully"
        if: matrix.profile == 'research' && runner.os == 'Linux'
        run: |
          # Config exists but Presidio Python packages are not installed
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.claude/templates/investigation"
          echo "analyzer: {}" > "$HOME/.claude/templates/investigation/presidio.yaml"
          script_src="$GITHUB_WORKSPACE/profiles/research/scripts/sanitize.sh"
          tmp_file=$(mktemp)
          echo "test content" > "$tmp_file"
          "$script_src" "$tmp_file"
          echo "OK: sanitize.sh exits 0 when Presidio is not installed"

      # ── Phase 6: Dogfood test (Linux only) ─────────────────────

      - name: "Dogfood: full user journey"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail

          # Use isolated HOME so nothing touches the real system
          export HOME=$(mktemp -d)
          echo "Using isolated HOME=$HOME"

          # Install fresh
          bash install.sh --profile ${{ matrix.profile }} --force

          # Create a sample project
          proj=$(mktemp -d)
          git init "$proj"
          git -C "$proj" config user.email "ci@test"
          git -C "$proj" config user.name "CI"

          # Scaffold project (simulates /playbook project)
          cp "$HOME/.claude/templates/project-CLAUDE.md" "$proj/CLAUDE.md"
          mkdir -p "$proj/.git/hooks"
          cp "$HOME/.claude/templates/hooks/pre-commit" "$proj/.git/hooks/pre-commit"
          chmod +x "$proj/.git/hooks/pre-commit"

          # Initial commit
          echo "# Test Project" > "$proj/README.md"
          git -C "$proj" add README.md CLAUDE.md
          git -C "$proj" commit -m "initial commit"
          echo "OK: initial commit succeeded"

          # Make a code change and commit (hook should pass)
          echo 'console.log("hello")' > "$proj/index.js"
          git -C "$proj" add index.js
          git -C "$proj" commit -m "add index.js"
          echo "OK: code change commit passed hook"

          # Verify no hardcoded paths in installed skills
          if grep -r 'C--Users-johnw' "$HOME/.claude/skills/" 2>/dev/null; then
            echo "FAIL: hardcoded user-specific path found in skills"
            exit 1
          fi
          echo "OK: no hardcoded paths in skills"

          # Verify YAML frontmatter of skills is parseable
          for skill in "$HOME/.claude/skills"/*/SKILL.md; do
            [ -f "$skill" ] || continue
            # Check opening ---
            head -1 "$skill" | grep -q '^---$' || {
              echo "FAIL: $skill missing opening ---"
              exit 1
            }
            # Check closing --- exists within first 10 lines
            head -10 "$skill" | tail -n +2 | grep -q '^---$' || {
              echo "FAIL: $skill missing closing ---"
              exit 1
            }
            # Check allowed-tools is present
            head -10 "$skill" | grep -q '^allowed-tools:' || {
              echo "FAIL: $skill missing allowed-tools"
              exit 1
            }
            echo "OK: $skill frontmatter valid"
          done

      - name: "Scaffold an investigation (research profile)"
        if: matrix.profile == 'research'
        shell: bash
        run: |
          inv_dir="$HOME/.claude/investigations/TEST-001"
          mkdir -p "$inv_dir/EVIDENCE"

          # Copy brief template (what /investigate new does)
          cp "$HOME/.claude/templates/investigation/brief.md" "$inv_dir/BRIEF.md"

          # Verify brief template structure
          grep -q "## Question" "$inv_dir/BRIEF.md"
          grep -q "## Scope" "$inv_dir/BRIEF.md"
          grep -q "## Context" "$inv_dir/BRIEF.md"
          echo "OK: investigation brief has expected sections"

          # Simulate collecting evidence (numbered files)
          echo "Source: test" > "$inv_dir/EVIDENCE/001-initial-finding.md"
          echo "Source: test" > "$inv_dir/EVIDENCE/002-follow-up.md"
          test -f "$inv_dir/EVIDENCE/001-initial-finding.md"
          test -f "$inv_dir/EVIDENCE/002-follow-up.md"
          echo "OK: evidence files created with sequential numbering"

          # Verify investigation lives under _patterns parent
          test -d "$HOME/.claude/investigations/_patterns"
          echo "OK: _patterns directory exists for cross-investigation patterns"

      # ── Phase 7: Cross-profile switching (Linux only) ────────────

      - name: "Cross-profile: dev → research → dev"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail

          # Use isolated HOME
          export HOME=$(mktemp -d)
          echo "CROSS_PROFILE_HOME=$HOME" >> "$GITHUB_ENV"
          echo "Using isolated HOME=$HOME"

          # Step 1: Install dev profile
          bash install.sh --profile dev --force
          echo "--- Dev profile installed ---"

          # Verify dev skills present
          test -d "$HOME/.claude/skills/checkpoint"  && echo "OK: checkpoint present"
          test -d "$HOME/.claude/skills/create-project" && echo "OK: create-project present"
          test -d "$HOME/.claude/skills/playbook"    && echo "OK: playbook present"
          test -d "$HOME/.claude/skills/continue"    && echo "OK: continue present"
          test -d "$HOME/.claude/skills/learn"       && echo "OK: learn present"
          test -d "$HOME/.claude/skills/promote"     && echo "OK: promote present"

          # Step 2: Switch to research profile
          bash install.sh --profile research --force
          echo "--- Switched to research profile ---"

          # Verify dev-only skills removed
          for skill in checkpoint create-project playbook learn promote; do
            if [ -d "$HOME/.claude/skills/$skill" ]; then
              echo "FAIL: dev-only skill /$skill should have been removed"
              exit 1
            fi
            echo "OK: /$skill removed"
          done

          # Verify research skills present
          test -d "$HOME/.claude/skills/investigate" && echo "OK: investigate present"
          test -d "$HOME/.claude/skills/continue"    && echo "OK: continue still present"

          # Verify CLAUDE.md switched to research
          grep -q "Question, Collect, Synthesize, Close" "$HOME/.claude/CLAUDE.md"
          echo "OK: CLAUDE.md has research workflow"

          # Step 3: Switch back to dev profile
          bash install.sh --profile dev --force
          echo "--- Switched back to dev profile ---"

          # Verify research-only skills removed
          if [ -d "$HOME/.claude/skills/investigate" ]; then
            echo "FAIL: research-only skill /investigate should have been removed"
            exit 1
          fi
          echo "OK: /investigate removed"

          # Verify dev skills restored
          test -d "$HOME/.claude/skills/checkpoint"  && echo "OK: checkpoint restored"
          test -d "$HOME/.claude/skills/create-project" && echo "OK: create-project restored"
          test -d "$HOME/.claude/skills/playbook"    && echo "OK: playbook restored"
          test -d "$HOME/.claude/skills/continue"    && echo "OK: continue still present"
          test -d "$HOME/.claude/skills/learn"       && echo "OK: learn restored"
          test -d "$HOME/.claude/skills/promote"     && echo "OK: promote restored"

          # Verify CLAUDE.md switched back to dev
          grep -q "Explore, Plan, Code, Verify, Commit" "$HOME/.claude/CLAUDE.md"
          echo "OK: CLAUDE.md has dev workflow"

      - name: "Cross-profile: dev → research → dev (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Use isolated USERPROFILE
          $testHome = Join-Path $env:TEMP "cross-profile-$(Get-Random)"
          New-Item -ItemType Directory -Path $testHome -Force | Out-Null
          $origProfile = $env:USERPROFILE
          $env:USERPROFILE = $testHome

          try {
            # Step 1: Install dev profile
            & .\install.ps1 -Profile dev -Force
            Write-Output "--- Dev profile installed ---"

            # Verify dev skills present
            foreach ($skill in @('checkpoint', 'create-project', 'playbook', 'continue', 'learn', 'promote')) {
              if (-not (Test-Path "$testHome\.claude\skills\$skill")) {
                throw "FAIL: dev skill $skill missing"
              }
              Write-Output "OK: $skill present"
            }

            # Step 2: Switch to research profile
            & .\install.ps1 -Profile research -Force
            Write-Output "--- Switched to research profile ---"

            # Verify dev-only skills removed
            foreach ($skill in @('checkpoint', 'create-project', 'playbook', 'learn', 'promote')) {
              if (Test-Path "$testHome\.claude\skills\$skill") {
                throw "FAIL: dev-only skill $skill should have been removed"
              }
              Write-Output "OK: $skill removed"
            }

            # Verify research skills present
            if (-not (Test-Path "$testHome\.claude\skills\investigate")) {
              throw "FAIL: investigate skill missing"
            }
            Write-Output "OK: investigate present"

            # Verify CLAUDE.md switched to research
            $content = Get-Content "$testHome\.claude\CLAUDE.md" -Raw
            if ($content -notmatch 'Question, Collect, Synthesize, Close') {
              throw "FAIL: CLAUDE.md does not have research workflow"
            }
            Write-Output "OK: CLAUDE.md has research workflow"

            # Step 3: Switch back to dev profile
            & .\install.ps1 -Profile dev -Force
            Write-Output "--- Switched back to dev profile ---"

            # Verify research-only skills removed
            if (Test-Path "$testHome\.claude\skills\investigate") {
              throw "FAIL: research-only skill investigate should have been removed"
            }
            Write-Output "OK: investigate removed"

            # Verify dev skills restored
            foreach ($skill in @('checkpoint', 'create-project', 'playbook', 'continue', 'learn', 'promote')) {
              if (-not (Test-Path "$testHome\.claude\skills\$skill")) {
                throw "FAIL: dev skill $skill not restored"
              }
              Write-Output "OK: $skill restored"
            }

            # Verify CLAUDE.md switched back to dev
            $content = Get-Content "$testHome\.claude\CLAUDE.md" -Raw
            if ($content -notmatch 'Explore, Plan, Code, Verify, Commit') {
              throw "FAIL: CLAUDE.md does not have dev workflow"
            }
            Write-Output "OK: CLAUDE.md has dev workflow"
          } finally {
            $env:USERPROFILE = $origProfile
          }

      # ── Phase 8: Invalid profile error ───────────────────────────

      - name: "Invalid profile: bash rejects unknown profile"
        if: runner.os == 'Linux'
        run: |
          output=$(bash install.sh --profile bogus 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "Unknown profile"; then
            echo "OK: bash rejects unknown profile with error message"
          else
            echo "FAIL: expected 'Unknown profile' error"
            exit 1
          fi

      - name: "Invalid profile: PowerShell rejects unknown profile"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            & .\install.ps1 -Profile bogus -DryRun *>&1 | Out-Null
            throw "FAIL: should have thrown on invalid profile"
          } catch {
            if ($_.Exception.Message -match 'ValidateSet|validate set|Cannot validate argument') {
              Write-Output "OK: PowerShell ValidateSet rejects unknown profile"
            } elseif ($_.Exception.Message -match 'FAIL: should have thrown') {
              throw $_
            } else {
              # Any other error from parameter binding is acceptable
              Write-Output "OK: PowerShell rejects unknown profile: $($_.Exception.Message)"
            }
          }

      # ── Phase 9: Knowledge repo integration ─────────────────────

      - name: "Knowledge repo: install with --knowledge-repo"
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail

          # Use isolated HOME
          export HOME=$(mktemp -d)
          echo "Using isolated HOME=$HOME"

          # Create a bare git repo as a dummy knowledge source
          bare_repo=$(mktemp -d)
          git init --bare "$bare_repo"

          # Seed it with a sample entry
          work=$(mktemp -d)
          git clone "$bare_repo" "$work"
          git -C "$work" config user.email "ci@test"
          git -C "$work" config user.name "CI"
          mkdir -p "$work/entries/20260222-test-entry"
          cat > "$work/entries/20260222-test-entry/entry.md" << 'ENTRY'
          ---
          id: "20260222-test-entry"
          tool: "git"
          category: "gotcha"
          tags: ["test"]
          confidence: "high"
          ---
          # Test Entry
          This is a test knowledge entry for CI.
          ENTRY
          git -C "$work" add .
          git -C "$work" commit -m "seed entry"
          git -C "$work" push

          # Run install with --knowledge-repo pointing to local bare repo
          bash install.sh --profile dev --force --knowledge-repo "$bare_repo"

          # Verify knowledge directory exists and has entries
          test -d "$HOME/.claude/knowledge/.git" && echo "OK: knowledge repo cloned (.git exists)"
          test -d "$HOME/.claude/knowledge/entries" && echo "OK: entries directory exists"
          test -f "$HOME/.claude/knowledge/entries/20260222-test-entry/entry.md" && echo "OK: seeded entry present"

      - name: "Pre-install validation: missing node detected"
        if: runner.os == 'Linux'
        run: |
          # Hide node by prepending a directory with a fake node that exits 127
          hide_dir=$(mktemp -d)
          cat > "$hide_dir/node" << 'FAKE'
          #!/bin/sh
          exit 127
          FAKE
          # Remove the fake — we just need node absent, not faked
          rm "$hide_dir/node"

          # Create a minimal PATH with only basic tools (no node)
          export PATH="$hide_dir:/usr/bin:/bin"
          output=$(bash install.sh --profile dev --dry-run 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "not found on PATH"; then
            echo "OK: install.sh detects missing node"
          else
            echo "FAIL: expected 'not found on PATH' error"
            exit 1
          fi

      - name: "Knowledge repo: install with -KnowledgeRepo (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Use isolated USERPROFILE
          $testHome = Join-Path $env:TEMP "knowledge-$(Get-Random)"
          New-Item -ItemType Directory -Path $testHome -Force | Out-Null
          $origProfile = $env:USERPROFILE
          $env:USERPROFILE = $testHome

          try {
            # Create a bare git repo as a dummy knowledge source
            $bareRepo = Join-Path $env:TEMP "bare-knowledge-$(Get-Random)"
            git init --bare $bareRepo

            # Seed it with a sample entry
            $work = Join-Path $env:TEMP "work-knowledge-$(Get-Random)"
            git clone $bareRepo $work
            git -C $work config user.email "ci@test"
            git -C $work config user.name "CI"
            New-Item -ItemType Directory -Path "$work/entries/20260222-test-entry" -Force | Out-Null
            @"
          ---
          id: "20260222-test-entry"
          tool: "git"
          category: "gotcha"
          tags: ["test"]
          confidence: "high"
          ---
          # Test Entry
          This is a test knowledge entry for CI.
          "@ | Set-Content "$work/entries/20260222-test-entry/entry.md"
            git -C $work add .
            git -C $work commit -m "seed entry"
            git -C $work push

            # Run install with -KnowledgeRepo
            & .\install.ps1 -Profile dev -Force -KnowledgeRepo $bareRepo

            # Verify knowledge directory exists and has entries
            if (-not (Test-Path "$testHome\.claude\knowledge\.git")) {
              throw "FAIL: knowledge repo not cloned"
            }
            Write-Output "OK: knowledge repo cloned (.git exists)"

            if (-not (Test-Path "$testHome\.claude\knowledge\entries")) {
              throw "FAIL: entries directory missing"
            }
            Write-Output "OK: entries directory exists"

            if (-not (Test-Path "$testHome\.claude\knowledge\entries\20260222-test-entry\entry.md")) {
              throw "FAIL: seeded entry missing"
            }
            Write-Output "OK: seeded entry present"
          } finally {
            $env:USERPROFILE = $origProfile
          }

      # ── Phase 10: Session hooks syntax validation ─────────────────

      - name: "Session hooks: JavaScript syntax valid"
        shell: bash
        run: |
          node --check "$HOME/.claude/hooks/session-start.js"
          echo "OK: session-start.js parses correctly"
          node --check "$HOME/.claude/hooks/session-end.js"
          echo "OK: session-end.js parses correctly"

      - name: "Pre-install validation: missing node detected (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Run install.ps1 in a child process with restricted PATH so its
          # exit 1 doesn't fail this step
          $scriptPath = Resolve-Path ".\install.ps1"
          $output = & pwsh -NoProfile -Command "
            `$env:PATH = 'C:\Windows\System32'
            & '$scriptPath' -Profile dev -DryRun *>&1 | Out-String
          " 2>&1 | Out-String
          Write-Output $output
          if ($output -match 'not found on PATH') {
            Write-Output "OK: install.ps1 detects missing node"
          } else {
            throw "FAIL: expected 'not found on PATH' error"
          }
